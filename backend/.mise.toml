[tools]
postgres = "18.3"
rust = "1.94.0"

[tasks.build]
description = "Build Release Program"
run = "cargo build --release"

[tasks.run]
description = "Build and Run"
run = "cargo run --release"

[env]
SQLX_OFFLINE=true
DATABASE_URL="postgres://freshmeal_user:123@localhost/freshmeal"
JWT_SECRET="freshmeal_secret"
