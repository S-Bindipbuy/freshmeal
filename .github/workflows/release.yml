name: Finish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flutter-android:
    name: Flutter Android APK
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          activate: true

      - name: Generate protobuf files
        run: |
          chmod +x generate_proto.sh
          ./generate_proto.sh

      - name: Build release APK
        working-directory: frontend
        run: |
          flutter pub get
          flutter build apk --release \
            --dart-define=API_URL=${{ secrets.API_URL }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: freshmeal-android-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk

  create-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-build:
    name: Build Backend (${{ matrix.target }})
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Generate protobuf files (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          chmod +x generate_proto.sh
          ./generate_proto.sh

      - name: Generate protobuf files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./generate_proto.ps1

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: backend -> target

      - name: Build and upload backend binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: backend
          target: ${{ matrix.target }}
          manifest-path: backend/Cargo.toml
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          SQLX_OFFLINE: true

      - name: Download APK artifact
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/download-artifact@v4
        with:
          name: freshmeal-android-apk
          path: apk

      - name: Upload APK to GitHub Release
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: softprops/action-gh-release@v2
        with:
          files: apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
